<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мониторинг конкурентов</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 20px; background: #f0f2f5; }
        .card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        button, input, select { padding: 8px 12px; margin: 5px; border-radius: 20px; border: 1px solid #ccc; }
        button { background: #2563eb; color: white; cursor: pointer; }
        table { border-collapse: collapse; width: 100%; background: white; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        .good { background: #d1fae5; }
        .bad { background: #fee2e2; }
        #status { margin: 10px 0; font-weight: bold; }
    </style>
</head>
<body>
<h1>📊 Мониторинг конкурентов</h1>
<div id="status">Загрузка...</div>

<div class="card">
    <h3>📁 Проекты и модели</h3>
    <div id="projectsPanel">Загрузите Excel/CSV с моделями</div>
</div>

<div class="card">
    <h3>💰 Редактор цен</h3>
    <label>Менеджер: <select id="managerSelect"></select></label>
    <label>Проект: <select id="projectSelect"></select></label>
    <label>Модель: <select id="modelSelect"></select></label>
    <input type="number" id="ourPrice" placeholder="Наша цена">
    <input type="number" id="comp1" placeholder="Конкурент 1">
    <input type="number" id="comp2" placeholder="Конкурент 2">
    <input type="number" id="comp3" placeholder="Конкурент 3">
    <button id="saveBtn">Сохранить</button>
</div>

<div class="card">
    <h3>📈 Общий отчёт</h3>
    <table id="summaryTable"><thead><tr><th>Менеджер</th><th>Проект</th><th>Модель</th><th>Наша цена</th><th>Средняя конкурентов</th><th>Разница</th></tr></thead><tbody></tbody></table>
</div>

<div class="card">
    <h3>📤 Загрузить структуру (Excel/CSV)</h3>
    <input type="file" id="fileInput" accept=".xlsx,.xls,.csv">
    <button id="uploadBtn">Добавить модели</button>
    <button id="resetBtn">Сбросить все проекты</button>
    <hr>
    <a id="downloadTemplate" href="#">Скачать шаблон CSV</a>
</div>

<script>
    // ========== НАСТРОЙКА ==========
    const API_URL = "https://script.google.com/macros/s/AKfycbyD1qPYPUslIB8NuKqUNKsBQHHE1xb0IgtO2fcVgDl75JUI0QcyvqpBwqo8HjwgcvfIAw/exec";   // СЮДА ВСТАВЬТЕ ВАШ URL ИЗ APPS SCRIPT
    const MANAGERS = ["Стас", "Оля", "Ильяс", "Игорь"];

    let projectModels = {};   // { manager: { project: [model1, model2] } }
    let priceData = {};       // { manager: { project: { model: { ourPrice, comp1, comp2, comp3 } } } }
    let currentManager = "Стас";
    let currentProject = "";

    // ========== ЗАГРУЗКА ДАННЫХ ==========
    async function loadAllData() {
        try {
            const res = await fetch(API_URL);
            const data = await res.json();
            // Обработка структуры (игнорируем заголовок)
            const structRows = data.structure || [];
            const newModels = {};
            for (let mgr of MANAGERS) newModels[mgr] = {};
            for (let i = 1; i < structRows.length; i++) {
                const row = structRows[i];
                if (row.length >= 3 && row[0] && row[1] && row[2]) {
                    const mgr = row[0];
                    const proj = row[1];
                    const model = row[2];
                    if (!newModels[mgr][proj]) newModels[mgr][proj] = [];
                    if (!newModels[mgr][proj].includes(model)) newModels[mgr][proj].push(model);
                }
            }
            // Сортируем модели
            for (let mgr in newModels) {
                for (let proj in newModels[mgr]) {
                    newModels[mgr][proj].sort();
                }
            }
            projectModels = newModels;

            // Обработка цен (игнорируем заголовок)
            const priceRows = data.prices || [];
            const newPrices = {};
            for (let mgr of MANAGERS) newPrices[mgr] = {};
            for (let i = 1; i < priceRows.length; i++) {
                const row = priceRows[i];
                if (row.length >= 7 && row[0] && row[1] && row[2]) {
                    const mgr = row[0];
                    const proj = row[1];
                    const model = row[2];
                    const ourPrice = row[3] ? Number(row[3]) : "";
                    const comp1 = row[4] ? Number(row[4]) : "";
                    const comp2 = row[5] ? Number(row[5]) : "";
                    const comp3 = row[6] ? Number(row[6]) : "";
                    if (!newPrices[mgr][proj]) newPrices[mgr][proj] = {};
                    newPrices[mgr][proj][model] = { ourPrice, comp1, comp2, comp3 };
                }
            }
            priceData = newPrices;

            document.getElementById('status').innerHTML = "✅ Данные загружены";
            renderUI();
        } catch (err) {
            console.error(err);
            document.getElementById('status').innerHTML = "❌ Ошибка загрузки: " + err.message;
        }
    }

    // ========== СОХРАНЕНИЕ ЦЕНЫ ==========
    async function savePrice(manager, project, model, ourPrice, comp1, comp2, comp3) {
        const payload = {
            prices: [{
                manager, project, model,
                ourPrice: ourPrice === "" ? "" : Number(ourPrice),
                comp1: comp1 === "" ? "" : Number(comp1),
                comp2: comp2 === "" ? "" : Number(comp2),
                comp3: comp3 === "" ? "" : Number(comp3),
                user: localStorage.getItem("userName") || "Аноним"
            }]
        };
        try {
            const res = await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });
            const result = await res.json();
            if (result.status === "ok") {
                await loadAllData();
            } else {
                alert("Ошибка сохранения: " + result.message);
            }
        } catch (err) {
            alert("Ошибка сети: " + err.message);
        }
    }

    // ========== СОХРАНЕНИЕ ВСЕЙ СТРУКТУРЫ ==========
    async function saveStructureToSheet() {
        const structList = [];
        for (let mgr of MANAGERS) {
            for (let proj in projectModels[mgr]) {
                for (let model of projectModels[mgr][proj]) {
                    structList.push({ manager: mgr, project: proj, model: model });
                }
            }
        }
        const payload = { structure: structList };
        try {
            await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });
        } catch (err) {
            console.error(err);
        }
    }

    // ========== ДОБАВЛЕНИЕ МОДЕЛЕЙ ИЗ ФАЙЛА ==========
    function addModelsFromFile(file) {
        const isExcel = file.name.endsWith('.xlsx') || file.name.endsWith('.xls');
        const processRows = (rows) => {
            let startRow = 0;
            if (rows.length && rows[0][0] && (String(rows[0][0]).toLowerCase().includes('менеджер') || String(rows[0][1]).toLowerCase().includes('проект'))) {
                startRow = 1;
            }
            let added = 0;
            for (let i = startRow; i < rows.length; i++) {
                const row = rows[i];
                if (row.length >= 3 && row[0] && row[1] && row[2]) {
                    let mgr = String(row[0]).trim();
                    let proj = String(row[1]).trim();
                    let model = String(row[2]).trim();
                    if (MANAGERS.includes(mgr) && proj && model) {
                        if (!projectModels[mgr][proj]) projectModels[mgr][proj] = [];
                        if (!projectModels[mgr][proj].includes(model)) {
                            projectModels[mgr][proj].push(model);
                            added++;
                        }
                    }
                }
            }
            if (added > 0) {
                // Сортировка
                for (let mgr in projectModels) {
                    for (let proj in projectModels[mgr]) {
                        projectModels[mgr][proj].sort();
                    }
                }
                saveStructureToSheet().then(() => loadAllData());
                document.getElementById('status').innerHTML = `✅ Добавлено ${added} моделей`;
            } else {
                alert("Новых моделей не найдено");
            }
        };

        if (isExcel) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });
                processRows(rows);
            };
            reader.readAsArrayBuffer(file);
        } else {
            const reader = new FileReader();
            reader.onload = (e) => {
                const text = e.target.result;
                const lines = text.split(/\r?\n/);
                const rows = lines.map(line => line.split(/[,\t;]/).map(cell => cell.trim()));
                processRows(rows);
            };
            reader.readAsText(file, "UTF-8");
        }
    }

    async function resetAllProjects() {
        if (confirm("Удалить все проекты и модели для всех менеджеров?")) {
            for (let mgr of MANAGERS) projectModels[mgr] = {};
            await saveStructureToSheet();
            await loadAllData();
        }
    }

    // ========== ОТРИСОВКА ИНТЕРФЕЙСА ==========
    function renderUI() {
        // Выпадающий список менеджеров
        const mgrSelect = document.getElementById('managerSelect');
        mgrSelect.innerHTML = "";
        for (let mgr of MANAGERS) {
            const opt = document.createElement('option');
            opt.value = mgr;
            opt.textContent = mgr;
            mgrSelect.appendChild(opt);
        }
        mgrSelect.value = currentManager;
        mgrSelect.onchange = () => {
            currentManager = mgrSelect.value;
            updateProjectSelect();
            renderProjectsPanel();
        };

        function updateProjectSelect() {
            const projSelect = document.getElementById('projectSelect');
            const projects = Object.keys(projectModels[currentManager] || {});
            projSelect.innerHTML = "";
            if (projects.length === 0) {
                projSelect.innerHTML = '<option>— нет проектов —</option>';
                currentProject = "";
                updateModelSelect();
                return;
            }
            for (let p of projects) {
                const opt = document.createElement('option');
                opt.value = p;
                opt.textContent = p;
                projSelect.appendChild(opt);
            }
            if (!currentProject || !projects.includes(currentProject)) {
                currentProject = projects[0];
            }
            projSelect.value = currentProject;
            projSelect.onchange = () => {
                currentProject = projSelect.value;
                updateModelSelect();
            };
            updateModelSelect();
        }

        function updateModelSelect() {
            const modelSelect = document.getElementById('modelSelect');
            const models = (projectModels[currentManager]?.[currentProject]) || [];
            modelSelect.innerHTML = "";
            if (models.length === 0) {
                modelSelect.innerHTML = '<option>— нет моделей —</option>';
                return;
            }
            for (let m of models) {
                const opt = document.createElement('option');
                opt.value = m;
                opt.textContent = m;
                modelSelect.appendChild(opt);
            }
            // Загружаем цены для первой модели
            if (models.length) {
                loadPriceForModel(models[0]);
                modelSelect.onchange = () => loadPriceForModel(modelSelect.value);
            }
        }

        function loadPriceForModel(model) {
            const entry = priceData[currentManager]?.[currentProject]?.[model] || { ourPrice: "", comp1: "", comp2: "", comp3: "" };
            document.getElementById('ourPrice').value = entry.ourPrice;
            document.getElementById('comp1').value = entry.comp1;
            document.getElementById('comp2').value = entry.comp2;
            document.getElementById('comp3').value = entry.comp3;
        }

        updateProjectSelect();

        // Панель проектов (для наглядности)
        function renderProjectsPanel() {
            const container = document.getElementById('projectsPanel');
            let html = "";
            for (let mgr of MANAGERS) {
                html += `<b>${mgr}</b><br>`;
                const projects = projectModels[mgr] || {};
                for (let proj in projects) {
                    html += `&nbsp;&nbsp;📁 ${proj} (${projects[proj].length} моделей)<br>`;
                }
            }
            container.innerHTML = html || "Нет проектов. Загрузите Excel/CSV.";
        }
        renderProjectsPanel();

        // Общий отчёт
        const rows = [];
        for (let mgr of MANAGERS) {
            for (let proj in projectModels[mgr]) {
                for (let model of projectModels[mgr][proj]) {
                    const entry = priceData[mgr]?.[proj]?.[model] || {};
                    const our = entry.ourPrice;
                    if (!our) continue;
                    const comps = [entry.comp1, entry.comp2, entry.comp3].filter(v => v && v > 0);
                    const avgComp = comps.length ? comps.reduce((a,b)=>a+b,0)/comps.length : our;
                    const diff = ((our - avgComp) / avgComp * 100).toFixed(1);
                    rows.push([mgr, proj, model, our, avgComp.toFixed(0), diff + "%"]);
                }
            }
        }
        const tbody = document.querySelector('#summaryTable tbody');
        tbody.innerHTML = "";
        for (let r of rows) {
            const tr = tbody.insertRow();
            r.forEach(cell => tr.insertCell().innerText = cell);
        }
    }

    // ========== СОБЫТИЯ ==========
    document.getElementById('saveBtn').onclick = () => {
        const model = document.getElementById('modelSelect').value;
        if (!currentProject || !model || model === "— нет моделей —") {
            alert("Выберите проект и модель");
            return;
        }
        const our = document.getElementById('ourPrice').value;
        const c1 = document.getElementById('comp1').value;
        const c2 = document.getElementById('comp2').value;
        const c3 = document.getElementById('comp3').value;
        savePrice(currentManager, currentProject, model, our, c1, c2, c3);
    };
    document.getElementById('uploadBtn').onclick = () => {
        const file = document.getElementById('fileInput').files[0];
        if (!file) { alert("Выберите файл"); return; }
        addModelsFromFile(file);
        document.getElementById('fileInput').value = "";
    };
    document.getElementById('resetBtn').onclick = resetAllProjects;
    document.getElementById('downloadTemplate').onclick = (e) => {
        e.preventDefault();
        const template = `Стас,Гига,HW50-BP1026\nСтас,Прайм,CP6\nОля,WB Bera,DS3200\nИльяс,ПТ Маркет,ПТ-100\nИгорь,Омега,Омега X1`;
        const blob = new Blob(["\uFEFF" + template], { type: "text/csv" });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = "template_models.csv";
        a.click();
        URL.revokeObjectURL(a.href);
    };

    // Запуск
    (async () => {
        let name = prompt("Введите ваше имя:", "Менеджер");
        if (name) localStorage.setItem("userName", name);
        await loadAllData();
        setInterval(loadAllData, 30000);
    })();
</script>
</body>
</html>
